<section id="contact" class="contact section-lg">
  <div class="container">
    <div class="contact-wrapper">
      <div class="contact-info reveal-left">
        <h6>Get in Touch</h6>
        <h2>Let's Capture Your <br>Love Story</h2>
        <p>Currently booking for 2026/2027. We would love to hear about your vision for the big day.</p>
        <div class="contact-details">
          <div class="detail-item reveal-up delay-1">
            <strong>Email</strong>
            <span>hello@plumtheory.com</span>
          </div>
          <div class="detail-item reveal-up delay-2">
            <strong>Location</strong>
            <span>Mumbai, India (Available Worldwide)</span>
          </div>
        </div>
      </div>
      <div class="contact-form-container reveal-right">
        <form class="contact-form">
          <div class="form-group">
            <input type="text" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <input type="email" placeholder="Email Address" required>
          </div>
          <div class="form-group">
            <select required>
              <option value="" disabled selected>Select Event Type</option>
              <option value="wedding">Wedding</option>
              <option value="engagement">Engagement</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <textarea placeholder="Tell us about your day" rows="4"></textarea>
          </div>
          <button type="submit" class="btn btn-block">Send Enquiry</button>
        </form>
      </div>
    </div>
  </div>
</section>
