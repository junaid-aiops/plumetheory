<section id="hero" class="hero" data-bg-mode="slider"> <!-- Options: 'image', 'video', 'slider' -->
  <div class="hero-bg">
    <!-- Mode: Single Image -->
    <img src="assets/images/hero.png" alt="Hero Background" class="bg-image">
    
    <!-- Mode: Video -->
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="assets/video/hero-bg.mp4" type="video/mp4">
    </video>

    <!-- Mode: Slider (Multi-image) -->
    <div class="bg-slider">
      <div class="slide active" style="background-image: url('assets/images/hero1.jpg');"></div>
      <div class="slide" style="background-image: url('assets/images/hero2.jpg');"></div>
      <div class="slide" style="background-image: url('assets/images/hero3.jpg');"></div>
    </div>

    <div class="hero-overlay"></div>
  </div>
  <div class="container hero-container">
    <div class="hero-content">
      <h6 class="reveal-up delay-1">Elegance in Every Frame</h6>
      <h1 class="reveal-up delay-2">Timeless Wedding <br><span>Storytelling</span></h1>
      <p class="reveal-up delay-3">Luxury photography for couples who value art, emotion, and the beauty of the moment.</p>
      <div class="hero-actions reveal-up delay-4">
        <a href="#portfolio" class="btn">View Our Work</a>
        <a href="#contact" class="btn btn-outline">Enquire Now</a>
      </div>
    </div>
  </div>
</section>
